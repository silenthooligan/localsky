<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>Offline · LocalSky</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #131c2e;
      --border: #21304a;
      --ink: #e7edf6;
      --muted: #94a3b8;
      --blue: #1490dc;
      --teal: #149c92;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: radial-gradient(120% 120% at 50% 0%, #142036 0%, var(--bg) 60%);
      color: var(--ink);
      font: 16px/1.55 system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }
    .mark {
      width: 84px;
      height: 84px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #fbcfcf;
      background: rgba(220, 80, 80, 0.12);
      border: 1px solid rgba(220, 80, 80, 0.35);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e06464;
    }
    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      padding: 12px 24px;
      border-radius: 12px;
      width: 100%;
    }
    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); }
    button:focus-visible { outline: 3px solid rgba(20, 144, 220, 0.6); outline-offset: 2px; }
    .hint {
      margin: 16px 0 0;
      font-size: 0.82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card" role="main">

        <path fill="#1490dc" fill-rule="evenodd" d="M280.9,426.9C307.4,418.5 321.2,392.1 311.7,368.0C308.3,359.4 303.9,351.1 296.8,340.1C285.3,322.2 275.3,305.8 272.8,300.5C269.9,294.6 268.7,295.0 264.4,303.0C259.6,311.8 250.1,327.4 242.0,339.5C227.5,361.3 224.7,368.3 224.6,384.0C224.5,394.8 224.7,395.9 227.6,402.0C233.2,413.9 242.7,422.1 256.5,426.8C260.6,428.2 276.6,428.2 280.9,426.9Z"/>
      </g>
    </svg>
    <span class="badge"><span class="dot"></span>Offline</span>
    <h1>You are offline</h1>
    <p>LocalSky cannot reach the server right now. Your weather and irrigation data will reappear as soon as the connection is back.</p>
    <button type="button" onclick="location.reload()">Try again</button>
    <p class="hint">This page is shown by LocalSky when the network is unavailable.</p>
  </main>
  <script>
    // Auto-retry the moment connectivity returns.
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
