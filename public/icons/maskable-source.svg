<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#122036" stop-opacity="1"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="dropFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7adfff"/>
      <stop offset="60%" stop-color="#4dd2ff"/>
      <stop offset="100%" stop-color="#0c8fbf"/>
    </linearGradient>
    <linearGradient id="boltFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff5b8"/>
      <stop offset="100%" stop-color="#ffb04a"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
