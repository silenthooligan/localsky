  <rect width="100" height="100" fill="#07090f"/>

  <g transform="translate(18 18) scale(1.0)">
    <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGlow)"/>
    <path d="M40 18 C 51 30, 53 42, 40 50 C 27 42, 29 30, 40 18 Z"
