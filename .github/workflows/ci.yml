name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch (action ships no semver tags)
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --no-default-features --features ssr --all-targets -- -D warnings

  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04-arm, macos-14]
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch (action ships no semver tags)
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      - name: cargo test
        run: cargo test --no-default-features --features ssr --lib

  build-wasm:
    name: cargo leptos build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch (action ships no semver tags)
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      - name: install cargo-leptos
        run: cargo install --locked cargo-leptos
      - name: build
        run: cargo leptos build --release

  markdown-lint:
    name: markdownlint (no em dashes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: detect em dashes in user-facing prose
        run: |
          if grep -nP '[\x{2014}\x{2013}]' README.md CONTRIBUTING.md SECURITY.md CHANGELOG.md CODE_OF_CONDUCT.md 2>/dev/null; then
            echo "Em or en dash detected; replace with commas, periods, or parens."
            exit 1
          fi

  # SC-06: scan the locked dependency tree against the RustSec advisory DB
  # and fail on any advisory. cargo-audit is installed as a prebuilt binary
  # via cargo-binstall (no compile, ~seconds) so this stays fast and never
  # gates on the rest of the matrix. It reads Cargo.lock directly, so no
  # project build is needed.
  cargo-audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch (action ships no semver tags)
      - name: install cargo-audit (prebuilt)
        uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # v1.20.0
      - run: cargo binstall --no-confirm cargo-audit
      - name: cargo audit
        # RustSec scan. Vulnerabilities always fail; unmaintained + unsound
        # advisories also fail (so new ones get caught). Yanked crates are
        # reported but not denied: the only yanked crate, aes 0.9.0, arrives
        # via web-push -> jwt-simple -> superboring and has no forward version.
        # The advisories below have no upgrade path we control and are accepted
        # with justification. Re-evaluate (and drop the ignore) when the parent
        # dependency bumps.
        #
        #   RUSTSEC-2023-0071  rsa Marvin timing sidechannel. No patched rsa
        #                      release exists anywhere (web-push VAPID chain).
        #   RUSTSEC-2026-0104  rustls-webpki CRL parse panic         \
        #   RUSTSEC-2026-0098  rustls-webpki URI name constraints     | all via
        #   RUSTSEC-2026-0049  rustls-webpki CRL authoritativeness    | rumqttc
        #   RUSTSEC-2026-0099  rustls-webpki wildcard name constraint /  0.25
        #                      Fixed in webpki 0.103 but rumqttc 0.25 pins
        #                      0.102; low exposure (MQTT broker TLS). Drop when
        #                      rumqttc ships a webpki-0.103 release.
        #   RUSTSEC-2025-0134  rustls-pemfile unmaintained (also rumqttc 0.25).
        #   RUSTSEC-2024-0436  paste unmaintained (Leptos internal).
        #   RUSTSEC-2026-0173  proc-macro-error2 unmaintained (Leptos internal).
        run: |
          cargo audit \
            --deny unmaintained --deny unsound \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0173
