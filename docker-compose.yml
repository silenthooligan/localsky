# LocalSky: Leptos full-stack weather + irrigation app.
# Tempest UDP (50222) + Ecowitt discovery use broadcast, so a multi-homed
# host should run network_mode: host to share every interface (one NIC for
# outbound APIs, another on the sensor subnet, for example).

services:
  localsky:
    image: ghcr.io/silenthooligan/localsky:latest
    container_name: localsky
    restart: unless-stopped
    network_mode: host
    # The image entrypoint starts as root, chowns /data (+ best-effort /keys) to
    # uid 10001, then gosu-drops, so the app runs non-root with no host chown
    # needed. Caps below are what the brief root entrypoint needs to chown + drop;
    # after the drop the app process holds none. (If a VAPID key is added to the
    # read-only keys mount, make it 10001-readable since /keys is :ro.)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
      # Runtime uid:gid the entrypoint runs the app as (chowns /data to it).
      # Defaults to the image's 10001; override for a NAS/NFS volume owner.
      - PUID=${PUID:-10001}
      - PGID=${PGID:-10001}
      - RUST_LOG=info
      - LEPTOS_SITE_ADDR=0.0.0.0:${LOCALSKY_PORT_1_INT}
      - LEPTOS_SITE_ROOT=site
      - WEATHER_APP_LAT=${WEATHER_APP_LAT}
      - WEATHER_APP_LON=${WEATHER_APP_LON}
      - WEATHER_APP_ZOOM=${WEATHER_APP_ZOOM}
      # HA REST poll for irrigation snapshot. Long-lived HA token.
      - HA_TOKEN=${HA_LONG_LIVED_TOKEN}
      - HA_URL=${HA_URL:-http://homeassistant.local:8123}
      # SQLite-backed irrigation history (365-day Gantt + utilization heatmap).
      - HISTORY_DB_PATH=/data/irrigation.db
      # LLM advisor (Phase F). Talks to the configured OpenAI-compatible LLM
      # endpoint. Set LLM_ADVISOR_DISABLED=1 to kill advisor calls without
      # redeploying.
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_ADVISOR_MODEL=${LLM_ADVISOR_MODEL}
      - LLM_ADVISOR_DISABLED=${LLM_ADVISOR_DISABLED}
      # Web Push (Phase PWA-5). VAPID keypair for signing notifications.
      # If unset, the dispatcher logs once and silently drops every event;
      # the rest of the app keeps running. Generate keys with the
      # web-push CLI or openssl, see docs/notifications.md for the recipe.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY_PATH=${VAPID_PRIVATE_KEY_PATH:-/keys/vapid-private.pem}
      # RFC 8292 subject: contact URL the push service may use. Override
      # with VAPID_SUBJECT (mailto: or https:) if you want your own.
      - VAPID_SUBJECT=${VAPID_SUBJECT:-https://github.com/silenthooligan/localsky}
    volumes:
      - ./data:/data
      # The VAPID private key lives in a host keys directory and is
      # mounted read-only; generate one with the web-push CLI or
      # openssl (see docs/notifications.md).
      - ./keys:/keys:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "localsky"
